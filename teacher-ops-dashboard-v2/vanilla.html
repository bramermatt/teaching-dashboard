<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Ops Dashboard v2 (Vanilla)</title>
  <style>
    :root { --bg:#04070d; --panel:#0b1324; --border:#21406b; --text:#d8e8ff; --muted:#7d9cc6; --accent:#58b8ff; --danger:#ff6b6b; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .shell { height:100vh; display:grid; grid-template-columns: 320px 1fr; gap:10px; padding:10px; }
    .panel { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:10px; }
    .left { display:grid; grid-auto-rows:min-content; gap:10px; overflow:auto; padding-right:2px; }
    .title { font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin:0 0 8px; }
    .clock { font-size:34px; font-weight:700; }
    .muted { color:var(--muted); font-size:12px; }
    .rr { display:grid; gap:8px; max-height:250px; overflow:auto; }
    .row { border:1px solid var(--border); border-radius:8px; padding:6px; font-size:13px; }
    iframe { width:100%; height:calc(100vh - 22px); border:none; border-radius:10px; }
    input,button{ background:#10203b; color:var(--text); border:1px solid var(--border); border-radius:8px; padding:8px; }
    button{ cursor:pointer; }
    .warn{ color:var(--danger); }
    .kpi { display:flex; justify-content:space-between; gap:8px; padding:6px 0; border-bottom:1px dashed var(--border); font-size:13px; }
    .kpi:last-child { border-bottom:none; }
  </style>
</head>
<body>
  <main class="shell">
    <section class="left">
      <article class="panel">
        <p class="title">Current Time</p>
        <div id="clock" class="clock"></div>
        <div id="date" class="muted"></div>
      </article>
      <article class="panel">
        <p class="title">Live Class Timers</p>
        <div class="kpi"><span>Current Class</span><strong id="currentClass">--</strong></div>
        <div class="kpi"><span>Until Bathroom Break</span><strong id="untilBreak">--:--</strong></div>
        <div class="kpi"><span>Until Class End</span><strong id="untilEnd">--:--</strong></div>
        <div class="kpi"><span>Days Until School Ends</span><strong id="daysLeft">--</strong></div>
      </article>
      <article class="panel">
        <p class="title">Subject / Unit</p>
        <div>Integrated Chemistry/Physics</div>
      </article>
      <article class="panel">
        <p class="title">Bathroom Tracker</p>
        <div style="display:flex; gap:6px; margin-bottom:8px;"><input id="name" placeholder="Student name" /><button id="out">Out</button></div>
        <div id="rr" class="rr"></div>
      </article>
    </section>
    <section class="panel">
      <p class="title">Bathroom Board (Fullscreen Embedded)</p>
      <iframe src="../apps/bathroom-pass/index.html?teacher=mr-bramer"></iframe>
    </section>
  </main>
  <script>
    const entries = JSON.parse(localStorage.getItem('ops-v2-vanilla-bathroom') || '[]');
    const clock = document.getElementById('clock');
    const date = document.getElementById('date');
    const rr = document.getElementById('rr');
    const currentClassEl = document.getElementById('currentClass');
    const untilBreakEl = document.getElementById('untilBreak');
    const untilEndEl = document.getElementById('untilEnd');
    const daysLeftEl = document.getElementById('daysLeft');
    const nameEl = document.getElementById('name');
    const schedule = [
      { label:'Period 1', start:'07:45', end:'08:30', breakStart:'08:00' },
      { label:'Period 2', start:'08:35', end:'09:20', breakStart:'08:50' },
      { label:'Period 3', start:'09:25', end:'10:10', breakStart:'09:40' },
      { label:'Period 5', start:'11:55', end:'12:40', breakStart:'12:10' },
      { label:'Period 6', start:'12:45', end:'13:30', breakStart:'13:00' },
      { label:'Period 7', start:'13:35', end:'14:20', breakStart:'13:50' }
    ];
    const schoolEndDate = new Date('2026-05-20T23:59:59');
    const toMinutes = (hhmm) => {
      const [h,m] = hhmm.split(':').map(Number);
      return h*60+m;
    };
    const formatSec = (sec) => {
      const safe = Math.max(0, Math.floor(sec));
      const m = Math.floor(safe/60);
      const s = safe%60;
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    };
    function save(){ localStorage.setItem('ops-v2-vanilla-bathroom', JSON.stringify(entries)); }
    function draw(){
      rr.innerHTML = entries.map((e,i)=>{
        const sec = Math.floor(((e.inAt || Date.now()) - e.outAt)/1000);
        const min = Math.floor(sec/60); const s = sec%60;
        return `<div class="row"><div style="display:flex;justify-content:space-between;"><strong>${e.name}</strong><span class="${sec>600?'warn':''}">${String(min).padStart(2,'0')}:${String(s).padStart(2,'0')}</span></div><div class="muted">Out ${new Date(e.outAt).toLocaleTimeString()} ${e.inAt?`• In ${new Date(e.inAt).toLocaleTimeString()}`:''}</div>${!e.inAt?`<button onclick="markIn(${i})" style="margin-top:6px;">Mark In</button>`:''}</div>`;
      }).join('') || '<p class="muted">No students out.</p>';
    }
    window.markIn = (i) => { entries[i].inAt = Date.now(); save(); draw(); };
    document.getElementById('out').addEventListener('click', ()=>{ if(!nameEl.value.trim()) return; entries.unshift({name:nameEl.value.trim(), outAt:Date.now()}); nameEl.value=''; save(); draw(); });
    nameEl.addEventListener('keydown', (e)=>{ if(e.key==='Enter') document.getElementById('out').click(); });
    setInterval(()=>{
      const n=new Date();
      const nowMin = n.getHours()*60+n.getMinutes();
      const nowSec = n.getHours()*3600+n.getMinutes()*60+n.getSeconds();
      const current = schedule.find((p)=> nowMin >= toMinutes(p.start) && nowMin < toMinutes(p.end));
      currentClassEl.textContent = current ? current.label : 'Outside Class';
      if (current) {
        untilEndEl.textContent = formatSec((toMinutes(current.end)*60)-nowSec);
        const breakStartSec = toMinutes(current.breakStart)*60;
        if (nowSec < breakStartSec) {
          untilBreakEl.textContent = formatSec(breakStartSec-nowSec);
        } else {
          untilBreakEl.textContent = 'OPEN / PASSED';
        }
      } else {
        untilEndEl.textContent = '--:--';
        untilBreakEl.textContent = '--:--';
      }
      const msLeft = schoolEndDate.getTime() - n.getTime();
      const days = Math.max(0, Math.ceil(msLeft / (1000*60*60*24)));
      daysLeftEl.textContent = String(days);

      clock.textContent=n.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
      date.textContent=n.toLocaleDateString([], {weekday:'short', month:'short', day:'numeric', year:'numeric'});
      draw();
    }, 1000);
  </script>
</body>
</html>
